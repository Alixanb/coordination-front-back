name: GitHub Actions
run-name: ${{ github.actor }}'s CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build with maven
        run: mvn clean test --file demo/pom.xml

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install node modules
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: "Run frontend tests"
        working-directory: front
        run: |
          npm ci
          npm run test

  cypress-run:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          working-directory: front
          start: npm start -- --host 127.0.0.1
          wait-on: "http://127.0.0.1:4200"
          browser: chrome
