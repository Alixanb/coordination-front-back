<div [routerLink]="['/notes', note.id]" class="note-card">
  <p class="note-title">{{ note.title }}</p>
  <p class="note-preview">{{ note.content | slice:0:80 }}{{ note.content.length > 80 ? '…' : '' }}</p>
  <button class="delete-btn" (click)="onDelete($event)" title="Delete note">✕</button>
</div>
