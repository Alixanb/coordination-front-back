<div [routerLink]="['/notes', note.id]" class="note-link">
  <p>note works!</p>
  <p class="note-title">{{note.title}}</p>
  <p class="note-content-preview">{{note.content | slice:0:50}}{{note.content.length > 50 ? '...' : ''}}</p>
  <button class="delete-btn" (click)="onDelete($event)">Delete</button>
</div>
