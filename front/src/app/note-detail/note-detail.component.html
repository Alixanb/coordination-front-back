<div class="detail-page">
  @if (note) {
    <div class="note-card">
      <h1 class="note-title">{{ note.title }}</h1>
      <p class="note-content">{{ note.content }}</p>
      <div class="actions">
        <a routerLink="/notes" class="back-link">← Back to board</a>
      </div>
    </div>
  } @else {
    <div class="loading">
      <p>Loading note…</p>
    </div>
  }
</div>
