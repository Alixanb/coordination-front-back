<div class="login-page">
  <div class="login-card">
    <h1 class="login-heading">Sign in to your board</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" formControlName="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      @if (error) {
        <p class="error-message">{{ error }}</p>
      }
      <button type="submit" [disabled]="loginForm.invalid">Sign In</button>
    </form>

    <div class="credentials-hint">
      <p class="hint-label">Test accounts — click to fill</p>
      <div class="hint-table">
        @for (account of testAccounts; track account.username) {
          <button type="button" class="hint-row" (click)="fillCredentials(account.username, account.password)">
            <span class="hint-role">{{ account.role }}</span>
            <span class="hint-user">{{ account.username }} / {{ account.password }}</span>
            <span class="hint-perm">{{ account.hint }}</span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
